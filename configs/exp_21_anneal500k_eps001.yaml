# exp_21 — Fast anneal (500k) + eps_end=0.01 + batch=64
# Combines exp_17 (fast anneal → higher peaks) and exp_18 (eps_end=0.01 → sustained).
# Hypothesis: reach near-greedy exploitation faster AND stay more greedy.
# exp_17_s0 peaked at 854 with fast anneal; exp_18_s0 sustained 718 with eps=0.01.
# Together they should give both higher peaks and sustained performance.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.01
eps_anneal_steps: 500_000
eps_eval: 0.01
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "mse"
eval_freq_steps: 10_000
eval_episodes: 5
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
