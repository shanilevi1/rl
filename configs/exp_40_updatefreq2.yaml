# exp_40 — update_freq=2 + eps_end=0.001 + batch=64
# Train every 2 env steps instead of 4 — 2x more gradient updates per episode.
# Hypothesis: more frequent updates → faster Q-value refinement → higher/sustained peaks.
# Risk: 2x bootstrap rate could amplify self-referential instability faster.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 2
gamma: 0.99
eps_start: 1.0
eps_end: 0.001
eps_anneal_steps: 1_000_000
eps_eval: 0.001
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "mse"
life_loss_terminal: false
maxpool_all_frames: false
noop_max: 0
eval_freq_steps: 100_000
eval_episodes: 50
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
