# exp_03 — Lower epsilon floor (0.05)
# Change: eps_end 0.1 → 0.05
# Hypothesis: less random noise in late training lets agent exploit better policy.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.05
eps_anneal_steps: 1_000_000
eps_eval: 0.05
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 32
replay_buffer_capacity: 200_000
grad_clip: 10.0
eval_freq_steps: 10_000
eval_episodes: 5
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
