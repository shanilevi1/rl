# exp_57 — gamma=0.97 + total_steps=10M + use_best_checkpoint_eval + lr_decay@3M
# Identical to exp_56 except total_steps: 5M → 10M.
# Rationale: exp_56 avg=2304 — new champion, but s0 peaked at only 1010 (stuck in bad local
# optimum at step 1.97M). With 10M steps and lr_decay over 7M steps (3M→10M):
#   step 5M: lr ≈ 0.000178 (still learning meaningfully)
#   step 7M: lr ≈ 0.000107
#   step 10M: lr = 0
# The slow decay gives unlucky seeds (like s0) more time in the full-lr exploration phase
# and a much longer warmdown phase to find and consolidate a good policy.
# s1 peaked at 3.63M (4260 1-ep → 3840 100-ep). With 10M, all seeds have 6.37M more steps
# to potentially find similar quality policies. If s0 reaches ~3000, avg ≈ 3000 bonus.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 10_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.97
eps_start: 1.0
eps_end: 0.001
eps_anneal_steps: 250_000
eps_eval: 0.001
lr: 0.00025
lr_decay_start_step: 3_000_000
lr_min: 0.0
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "mse"
life_loss_terminal: true
noop_max: 0
eval_freq_steps: 10_000
eval_episodes: 1
final_eval_episodes: 100
checkpoint_freq_steps: 500_000
use_best_checkpoint_eval: true
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
