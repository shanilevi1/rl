# exp_15 — Huber loss + batch=64
# Change vs exp_11: loss_fn mse → huber (smooth L1, delta=1)
# Hypothesis: MSE squares large TD errors, amplifying bootstrap oscillations.
# Huber clips the gradient to ±1 for |TD| > 1, giving a smoother loss
# landscape. Mnih 2015 (DQN Nature) used Huber; Mnih 2013 used MSE.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.05
eps_anneal_steps: 1_000_000
eps_eval: 0.05
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "huber"
eval_freq_steps: 10_000
eval_episodes: 5
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
