# exp_45 — eps_anneal_steps=500k + life_loss_terminal + eps_end=0.001 + batch=64
# Identical to exp_42 except anneal is 500k instead of 250k.
# Hypothesis: exp_42's high seed variance (327 vs 825) comes from committing near-greedy
# too early (250k steps). Doubling the exploration window lets both seeds find better
# initial policies before locking in. Trades some speed for consistency.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.001
eps_anneal_steps: 500_000
eps_eval: 0.001
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "mse"
life_loss_terminal: true
noop_max: 0
eval_freq_steps: 10_000
eval_episodes: 1
final_eval_episodes: 100
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
