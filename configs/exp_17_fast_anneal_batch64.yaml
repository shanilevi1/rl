# exp_17 — Faster epsilon anneal (500k) + batch=64
# Change vs exp_11: eps_anneal_steps 1M → 500k
# Hypothesis: with batch=64 giving stable gradients from the start, the agent
# can afford to exploit earlier. Reaching eps=0.05 by 500k instead of 1M
# means 500k extra steps of greedy play to consolidate a good policy.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.05
eps_anneal_steps: 500_000
eps_eval: 0.05
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "mse"
eval_freq_steps: 10_000
eval_episodes: 5
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
