# exp_10 — Correct lr (0.0001) + eps_end=0.05
# Root cause fix: ablations exp_03-09 all used lr=0.00025 which caused
# immediate Q-value divergence (q_mean 0.03→123→1176 in two steps).
# lr=0.0001 keeps bootstrap amplification slow enough to self-correct.
# Also restoring eps_end=0.05 which was present in the original stable run.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.05
eps_anneal_steps: 1_000_000
eps_eval: 0.05
lr: 0.0001
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 32
replay_buffer_capacity: 200_000
grad_clip: 10.0
eval_freq_steps: 10_000
eval_episodes: 5
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
