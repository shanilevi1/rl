# exp_16 — frame_skip=8 + batch=64
# Change vs exp_11: frame_skip 4 → 8, update_freq 4 → 8
# update_freq kept equal to frame_skip to train once per agent action.
# Hypothesis: Alien is a slow-paced game — longer action repeats commit the
# agent to a direction for 8 frames, reducing jitter and making each transition
# carry more meaningful state change than skip=4.
ale_game_id: "ALE/Alien-v5"
frame_skip: 8
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 8
gamma: 0.99
eps_start: 1.0
eps_end: 0.05
eps_anneal_steps: 1_000_000
eps_eval: 0.05
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "mse"
eval_freq_steps: 10_000
eval_episodes: 5
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
