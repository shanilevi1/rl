# exp_52 — use_best_checkpoint_eval + fast_anneal_250k + life_loss_terminal
# Identical to exp_42 except use_best_checkpoint_eval: true.
# Hypothesis: final_eval currently runs on the collapsed final weights (step 5M).
# The peak is at 2.8–3.4M with reward 839–1258. Saving ckpt_best.pt whenever a new
# 1-ep eval high is seen, then running the 100-episode final eval on that checkpoint
# should capture the policy at peak quality rather than post-collapse.
# This is a direct test of whether the collapse is the ONLY bottleneck.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.001
eps_anneal_steps: 250_000
eps_eval: 0.001
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "mse"
life_loss_terminal: true
noop_max: 0
eval_freq_steps: 10_000
eval_episodes: 1
final_eval_episodes: 100
checkpoint_freq_steps: 500_000
use_best_checkpoint_eval: true
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
