# exp_23 — eps_end=0.005 + batch=64
# One step below exp_18 (eps=0.01). At eps=0.005 the agent takes 1 random
# action per 200 steps — effectively deterministic exploitation.
# Hypothesis: if exp_18 showed sustained high rewards with 1% noise, removing
# almost all noise should let a good policy score even higher.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.005
eps_anneal_steps: 1_000_000
eps_eval: 0.005
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "mse"
eval_freq_steps: 10_000
eval_episodes: 5
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
