# exp_24 — Frame differencing + batch=64 + eps_end=0.005
# Change: frame_stack_mode stack → diff
# Each of the 4 channels is (f_t - f_{t-1}) shifted to uint8 (128=no motion).
# Hypothesis: explicit motion encoding helps the agent track moving aliens
# and bullets without having to infer velocity from two absolute frames.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.005
eps_anneal_steps: 1_000_000
eps_eval: 0.005
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "mse"
num_frames: 4
frame_stack_mode: "diff"
eval_freq_steps: 10_000
eval_episodes: 5
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
