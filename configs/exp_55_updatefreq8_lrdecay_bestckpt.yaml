# exp_55 — update_freq=8 + lr_decay@3M + use_best_checkpoint_eval
# Identical to exp_53 except update_freq: 4 → 8.
# Rationale: fewer gradient updates per env step → each step's Q-values are updated
# less aggressively → bootstrap self-amplification loop grows more slowly →
# collapse rate drops → the agent spends more time near its peak.
# update_freq=2 failed (exp_40, avg=268): too many updates → faster divergence.
# update_freq=8 is the opposite direction: half as many updates per step.
# Combined with lr_decay@3M + best_ckpt, two mechanisms attack the collapse simultaneously.
# Note: fewer updates means the agent may learn more slowly in the first 3M steps,
# but with best_ckpt_eval this only matters if the peak is lower, not if it arrives later.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 8
gamma: 0.99
eps_start: 1.0
eps_end: 0.001
eps_anneal_steps: 250_000
eps_eval: 0.001
lr: 0.00025
lr_decay_start_step: 3_000_000
lr_min: 0.0
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "mse"
life_loss_terminal: true
noop_max: 0
eval_freq_steps: 10_000
eval_episodes: 1
final_eval_episodes: 100
checkpoint_freq_steps: 500_000
use_best_checkpoint_eval: true
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
