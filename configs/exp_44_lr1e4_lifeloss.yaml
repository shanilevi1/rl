# exp_44 — lr=0.0001 + life_loss_terminal (no noop)
# Hypothesis: lr=0.0001 is the key stability mechanism (exp_38 s0 ended at 754 — best seen).
# life_loss_terminal adds survival incentive on top. noop dropped (consistently hurts).
# Standard 1M anneal kept (fast_anneal risky with lower lr: agent commits before Q-values mature).
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.001
eps_anneal_steps: 1_000_000
eps_eval: 0.001
lr: 0.0001
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "mse"
eval_freq_steps: 10_000
eval_episodes: 1
final_eval_episodes: 100
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
life_loss_terminal: true
