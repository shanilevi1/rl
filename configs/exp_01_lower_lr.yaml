# Experiment 01 — Lower learning rate
# Change vs base: lr 0.00025 → 0.0001
# Hypothesis: with grad_clip=10, effective update = clip * lr. Halving lr
# directly reduces the amplitude of spike updates that destabilise training
# after 1M steps (31-36 loss>1 spikes observed in baseline runs).

ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.1
eps_anneal_steps: 1_000_000
eps_eval: 0.05
lr: 0.0001
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 32
replay_buffer_capacity: 200_000
grad_clip: 10.0
eval_freq_steps: 10_000
eval_episodes: 5
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
