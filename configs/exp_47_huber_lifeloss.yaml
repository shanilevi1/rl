# exp_47 — Huber loss + fast_anneal_250k + life_loss_terminal
# Identical to exp_42 except loss_fn: mse → huber.
# Hypothesis: Huber loss clips gradient to ±1 for |TD_error| > 1, directly bounding
# Q-value amplification speed. exp_42 has collapse rate ~250/M steps. With Huber,
# large bootstrap errors can't produce unbounded gradients → slower Q-value runaway →
# lower collapse rate → higher final_eval_reward at step 5M.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.001
eps_anneal_steps: 250_000
eps_eval: 0.001
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "huber"
life_loss_terminal: true
noop_max: 0
eval_freq_steps: 10_000
eval_episodes: 1
final_eval_episodes: 100
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
