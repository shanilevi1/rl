# exp_20 — Slower epsilon anneal (2M) + batch=64
# Change vs exp_11: eps_anneal_steps 1M → 2M
# Hypothesis: annealing over 2M steps keeps exploration high longer, giving
# the agent more diverse experiences before locking in a policy. Alien has
# complex room layouts — broader exploration may find higher-scoring strategies
# that greedy play from step 1M would miss.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.05
eps_anneal_steps: 2_000_000
eps_eval: 0.05
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "mse"
eval_freq_steps: 10_000
eval_episodes: 5
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
