# Experiment 02 — Lower gradient clip (5.0)
# Change vs baseline: grad_clip 10 → 5
# Hypothesis: stable-phase grad_norms are 1-12; clip=5 leaves normal updates
# untouched but halves spike damage vs clip=10. Should reduce post-peak
# collapse without slowing normal learning (unlike exp_01 lower-lr which hurt).

ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.1
eps_anneal_steps: 1_000_000
eps_eval: 0.05
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 32
replay_buffer_capacity: 200_000
grad_clip: 5.0
eval_freq_steps: 10_000
eval_episodes: 5
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
