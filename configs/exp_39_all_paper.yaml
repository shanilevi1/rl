# exp_39 — ALL 3 Mnih 2013 features combined + eps_end=0.001 + batch=64
# noop_max=30 + life_loss_terminal + eps_anneal_steps=250k
# This is the "full paper" run — every feature from the 2013 paper applied at once.
ale_game_id: "ALE/Alien-v5"
frame_skip: 4
total_steps: 5_000_000
min_replay_size: 50_000
update_freq: 4
gamma: 0.99
eps_start: 1.0
eps_end: 0.001
eps_anneal_steps: 250_000
eps_eval: 0.001
lr: 0.00025
rmsprop_eps: 0.01
rmsprop_alpha: 0.95
batch_size: 64
replay_buffer_capacity: 1_000_000
grad_clip: 0.0
loss_fn: "mse"
life_loss_terminal: true
maxpool_all_frames: false
noop_max: 30
eval_freq_steps: 100_000
eval_episodes: 50
checkpoint_freq_steps: 500_000
wandb_project: "dqn-alien"
device: "cuda"
use_amp: true
